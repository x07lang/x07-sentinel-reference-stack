services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: orders_app
      POSTGRES_PASSWORD: orders
      POSTGRES_DB: orders
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders_app -d orders"]
      interval: 2s
      timeout: 5s
      retries: 30

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: x07ref
      RABBITMQ_DEFAULT_PASS: x07ref
      RABBITMQ_DEFAULT_VHOST: /
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 2s
      timeout: 10s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on: [minio]
    entrypoint:
      - /bin/sh
      - -lc
      - |
        set -euo pipefail
        until mc alias set local http://minio:9000 minio minio123 >/dev/null 2>&1; do
          sleep 1
        done
        mc mb -p local/reports >/dev/null || true
        mc anonymous set none local/reports >/dev/null || true
        echo "minio init complete"

  otel-collector:
    build:
      context: ./otel-collector
      args:
        OTEL_VERSION: "0.116.0"
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otelcol/config.yaml:ro
