mode: deployment
config:
  receivers:
    otlp:
      protocols:
        http:
        grpc:
  processors:
    batch:
  exporters:
    debug: {}
  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [debug]
      metrics:
        receivers: [otlp]
        processors: [batch]
        exporters: [debug]
      logs:
        receivers: [otlp]
        processors: [batch]
        exporters: [debug]
